
name: push image

on:
    push:
     branches:
        - main
    
    workflow_dispatch:
        inputs:
            tag:
                description: 'Tag to push (e.g., 1.0.0)'
                required: true
                default: 'latest'

permissions:
    contents: write

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Generate app token
              id: generate-token
              uses: actions/create-github-app-token@v3
              with:
                    client-id: ${{ secrets.CLIENT_ID }}
                    private-key: |
                        ${{ secrets.PRIVATE_KEY }}
            -
                name: Login to GHCR
                uses: docker/login-action@v4
                with:
                    registry: ghcr.io
                    username: ${{ steps.generate-token.outputs.app-slug }}[bot]
                    password: ${{ steps.generate-token.outputs.token }}
            -
                name: Set up QEMU
                uses: docker/setup-qemu-action@v4
            -
                name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4
            -
                name: Build and push
                uses: docker/build-push-action@v7
                with:
                    push: true
                    tags: |
                        ghcr.io/charliem312/website:${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || 'latest' }}
                    labels: |
                        org.opencontainers.image.source=${{ github.repositoryUrl }}
                        org.opencontainers.image.description="CharlieM312's personal website and portfolio"
                    annotations: |
                        index:org.opencontainers.image.description="CharlieM312's personal website and portfolio"
                        index:org.opencontainers.image.source=${{ github.repositoryUrl }}
                    platforms: linux/amd64,linux/arm64
                    cache-from: type=gha
                    cache-to: type=gha,mode=max
                    context: .
                    file: ./production.Dockerfile
            -
                name: Create a Tag
                if: github.event_name == 'workflow_dispatch'
                run: |
                    git config user.name "charliem312-github"
                    git config user.email "charliem312-github[bot]@users.noreply.github.com"
                    git tag ${{ github.event.inputs.tag }}
                    git push origin ${{ github.event.inputs.tag }}
            -   
                name: Create GitHub Release
                if: github.event_name == 'workflow_dispatch'
                uses: softprops/action-gh-release@v3
                with:
                    tag_name: ${{ github.event.inputs.tag }}
                    name: Release ${{ github.event.inputs.tag }}
                    generate_release_notes: true
                    draft: false
                    prerelease: false
                    body: |
                        ### 📦 Docker Image
                        To pull this specific version:
                        ```bash
                        docker pull ghcr.io/charliem312/website:${{ github.event.inputs.tag }}
                        ```
                        ---
            