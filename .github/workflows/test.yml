name: Test

on:
 push:
    branches:
        - main
        - preview
 pull_request:
    branches:
        - main
        - preview
permissions:
  contents: read
jobs:
    test:
        runs-on: ubuntu-latest
        name: Test
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: 'app/.nvmrc'
                  cache: 'npm'
                  cache-dependency-path: 'app/package-lock.json'

            - name: Install dependencies
              run: |
                cd app
                npm ci
            - name: Run tests
              run: |
                cd app
                npm run test
            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: test-results
                  path: app/test-results
            - name: Test Summary
              uses: test-summary/action@v2.6
              if: always()
              with:
                paths: app/test-results/results.xml
    lint:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
            node-version-file: 'app/.nvmrc'
      - name: Install dependencies
        run: |
          cd app
          npm ci
      - name: Run ESLint
        run: |
          cd app
          npm install -g @angular/cli
          if ng lint --format summary; then
            echo "✅ Linting passed - 0 problems" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Linting failed - see errors above" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
