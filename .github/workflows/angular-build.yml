name: Build Application

on:
    push:

jobs:

    angular-build:
        runs-on: ubuntu-latest
        permissions: 
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            
            - name: Set up node
              uses: actions/setup-node@v6
              with:
                node-version-file: 'app/.nvmrc'

            - name : Install + Build
              run: |
                npm install -g @angular/cli
                cd app
                npm install
                ng build
                
    production-build:
      runs-on: ubuntu-latest
      if: github.actor != 'dependabot[bot]'
      permissions:
        contents: read
      steps:
        - name: Checkout
          uses: actions/checkout@v6
        - name: Set up node
          uses: actions/setup-node@v6
          with:
            node-version-file: 'app/.nvmrc'
        - name : Install + Build
          run: |
              npm install -g @angular/cli
              cd app
              npm install
              npm run production
