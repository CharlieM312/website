name: Build Application

on:
    push:

jobs:

    angular-build:
        runs-on: ubuntu-latest
        permissions: 
          contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            
            - name: Set up node
              uses: actions/setup-node@v6
              with:
                node-version-file: 'app/.nvmrc'
                cache: 'npm'
                cache-dependency-path: 'app/package-lock.json'
            - name: Cache npm
              uses: actions/cache@v5
              with:
                path: |
                  ~/.npm
                key: ${{ runner.os }}-node-${{ hashFiles('app/package-lock.json') }}
                restore-keys: |
                  ${{ runner.os }}-node-
                  ${{ runner.os }}-node-${{ matrix.node-version }}-
            - name : Install + Build
              run: |
                npm install -g @angular/cli
                cd app
                npm install
                ng build
                
    production-build:
      runs-on: ubuntu-latest
      if: github.actor != 'dependabot[bot]'
      permissions:
        contents: read
      strategy:
        matrix:
          node-version: [22, 24, 26]
      steps:
        - name: Checkout
          uses: actions/checkout@v6
        - name: Set up node
          uses: actions/setup-node@v6
          with:
            node-version: ${{ matrix.node-version }}
            cache: 'npm'
            cache-dependency-path: 'app/package-lock.json'
        - name: Cache npm
          uses: actions/cache@v5
          with:
            path: |
              ~/.npm
            key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('app/package-lock.json') }}
            restore-keys: |
              ${{ runner.os }}-node-${{ matrix.node-version }}-
              ${{ runner.os }}-node-
        - name : Install + Build
          run: |
              npm install -g @angular/cli
              cd app
              npm install
              npm run production
